<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perelada Comercial - Inicio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F0F0F0;
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            padding: 20px;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-top: 10px;
        }
        .welcome-section h1 { font-size: 26px; color: #2D2D2D; font-weight: 800; }
        .welcome-section p { font-size: 14px; color: #64748B; margin-top: 4px; font-weight: 500; }
        
        /* Botón elegante para salir */
        .logout-btn {
            background: #E2E8F0;
            color: #475569;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .menu-card {
            background: white; border-radius: 18px; padding: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            height: 140px; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.01);
            transition: transform 0.2s;
        }
        .menu-card:active { transform: scale(0.96); }
        .card-icon { font-size: 32px; }
        .card-title { font-size: 15px; font-weight: 700; color: #2D2D2D; margin-top: 12px; }
        .card-desc { font-size: 11px; color: #94A3B8; font-weight: 500; margin-top: 2px; }

        /* Tarjeta especial ancha para los Kilómetros */
        .menu-card.wide { grid-column: span 2; height: 110px; flex-direction: row; align-items: center; gap: 16px; }
        .wide .text-block { display: flex; flex-direction: column; justify-content: center; }
    </style>
    <script>
        // SEGURIDAD: Si no hay un usuario real logueado en la memoria del móvil, le echa al login.html
        if (!localStorage.getItem('currentUser')) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>

    <div class="header-flex">
        <div class="welcome-section">
            <h1>Grup Perelada</h1>
            <p id="userGreeting">Portal Comercial</p>
        </div>
        <button class="logout-btn" onclick="cerrarSesion()">🚪 Salir</button>
    </div>

    <div class="menu-grid">
        <a href="kilometros.html" class="menu-card wide" style="border-left: 5px solid #F06B4E;">
            <div class="card-icon">🚗</div>
            <div class="text-block">
                <div class="card-title" style="margin-top:0;">Control de Kilómetros</div>
                <div class="card-desc">Registra tus KMs de Entrada y Salida directamente en tu ficha de SharePoint.</div>
            </div>
        </a>

        <a href="sos_contactos.html" class="menu-card" style="border-left: 4px solid #3B82F6;">
            <div class="card-icon">📞</div>
            <div>
                <div class="card-title">SOS Contactos</div>
                <div class="card-desc">Buscador inteligente de extensiones de la empresa.</div>
            </div>
        </a>

        <a href="promociones.html" class="menu-card" style="border-left: 4px solid #10B981;">
            <div class="card-icon">🏷️</div>
            <div>
                <div class="card-title">Promociones</div>
                <div class="card-desc">Consulta bases y ofertas activas en tiempo real.</div>
            </div>
        </a>
    </div>

    <script>
        // Personaliza el saludo con el nombre real del usuario logueado
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            document.getElementById('userGreeting').textContent = "Hola, " + currentUser.name;
        }

        function cerrarSesion() {
            // Borra el usuario activo del teléfono y vuelve a la pantalla de login
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
