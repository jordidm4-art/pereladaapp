<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perelada Girona Team - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 30px;
        }
        
        /* Área del Logo optimizada con imagen directa */
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-container {
            width: 100%;
            max-width: 280px;
            margin-bottom: 10px;
        }

        .logo-img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .logo-subtitle {
            font-family: 'Georgia', serif;
            font-size: 18px;
            color: #2D2D2D;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            color: #64748B;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            height: 50px;
            background: #F8FAFC;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 15px;
            color: #1E293B;
            outline: none;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            border-color: #F06B4E;
            background: #FFFFFF;
        }
        
        .btn-submit {
            width: 100%;
            height: 52px;
            background: #F06B4E;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(240, 107, 78, 0.2);
            transition: all 0.2s;
        }
        
        .btn-submit:active {
            transform: scale(0.98);
            opacity: 0.95;
        }
        
        .error-message, .success-message {
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            font-weight: 500;
            display: none;
            padding: 8px;
            border-radius: 8px;
        }
        
        .error-message { color: #EF4444; background: #FEF2F2; }
        .success-message { color: #10B981; background: #ECFDF5; }
        .show { display: block; }
        
        .links-area {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .link {
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .link-primary { color: #F06B4E; }
        .link-secondary { color: #64748B; }
    </style>
</head>
<body>

    <div class="logo-area">
        <div class="logo-container">
            <img src="https://www.perelada.com/images/logo-perelada.svg" alt="Perelada Logo" class="logo-img">
        </div>
        <div class="logo-subtitle" id="viewTitle">GIRONA TEAM</div>
    </div>

    <form id="loginForm">
        <div class="form-group" id="nameGroup" style="display: none;">
            <label class="form-label">Nombre Completo</label>
            <input type="text" id="regName" class="form-input" placeholder="Ej: Jordi Deu Mora">
        </div>

        <div class="form-group">
            <label class="form-label" id="emailLabel">Correo Electrónico Corporativo</label>
            <input type="email" id="username" class="form-input" placeholder="usuario@pereladachivite.com" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn-submit" id="mainBtn">Iniciar Sesión</button>
        <div id="errorMsg" class="error-message">Correo o contraseña incorrectos, Señor.</div>
        <div id="successMsg" class="success-message">¡Cuenta creada con éxito!</div>
    </form>

    <div class="links-area">
        <span class="link link-primary" id="toggleModeBtn" onclick="switchMode()">Crear cuenta nueva</span>
        <a href="mailto:jordi.deu@pereladachivite.com?subject=Recuperar%20Contraseña%20App" class="link link-secondary">¿Has olvidado tu contraseña?</a>
    </div>
    
    <script>
        let isLoginMode = true;

        let usersDB = JSON.parse(localStorage.getItem('perelada_users_database'));
        if (!usersDB) {
            usersDB = [
                { 
                    email: 'jordi.deu@pereladachivite.com', 
                    password: '1234', 
                    name: 'Jordi Deu Mora', 
                    role: 'admin'
                }
            ];
            localStorage.setItem('perelada_users_database', JSON.stringify(usersDB));
        }
        
        function switchMode() {
            const viewTitle = document.getElementById('viewTitle');
            const nameGroup = document.getElementById('nameGroup');
            const mainBtn = document.getElementById('mainBtn');
            const toggleModeBtn = document.getElementById('toggleModeBtn');
            const regName = document.getElementById('regName');
            isLoginMode = !isLoginMode;

            if (isLoginMode) {
                viewTitle.textContent = "GIRONA TEAM";
                nameGroup.style.display = "none";
                regName.required = false;
                mainBtn.textContent = "Iniciar Sesión";
                toggleModeBtn.textContent = "Crear cuenta nueva";
            } else {
                viewTitle.textContent = "REGISTRO";
                nameGroup.style.display = "block";
                regName.required = true;
                mainBtn.textContent = "Registrar mi Cuenta";
                toggleModeBtn.textContent = "Volver al Login";
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById('username').value.toLowerCase().trim();
            const passwordInput = document.getElementById('password').value;
            const regNameInput = document.getElementById('regName').value.trim();
            
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            if (isLoginMode) {
                const user = usersDB.find(u => u.email === emailInput && u.password === passwordInput);
                
                if (user) {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    if (!localStorage.getItem('perelada_active_comercial_sheet')) {
                        localStorage.setItem('perelada_active_comercial_sheet', user.name);
                    }
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = "Correo o contraseña incorrectos, Señor.";
                    errorMsg.classList.add('show');
                    setTimeout(() => errorMsg.classList.remove('show'), 3000);
                }
            } else {
                const userExists = usersDB.some(u => u.email === emailInput);
                
                if (userExists) {
                    errorMsg.textContent = "Este correo ya está registrado en el sistema.";
                    errorMsg.classList.add('show');
                    setTimeout(() => errorMsg.classList.remove('show'), 3000);
                    return;
                }

                const newWorker = {
                    email: emailInput,
                    password: passwordInput,
                    name: regNameInput,
                    role: 'worker'
                };
                
                usersDB.push(newWorker);
                localStorage.setItem('perelada_users_database', JSON.stringify(usersDB));
                
                successMsg.classList.add('show');
                setTimeout(() => {
                    successMsg.classList.remove('show');
                    switchMode();
                }, 2000);
            }
        });
    </script>
</body>
</html>
