<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perelada Girona Team - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 30px;
        }
        
        /* Área del Logo optimizada con imagen directa */
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-container {
            width: 100%;
            max-width: 280px;
            margin-bottom: 10px;
        }

        .logo-img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .logo-subtitle {
            font-family: 'Georgia', serif;
            font-size: 18px;
            color: #2D2D2D;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            color: #64748B;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            height: 50px;
            background: #F8FAFC;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 15px;
            color: #1E293B;
            outline: none;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            border-color: #F06B4E;
            background: #FFFFFF;
        }
        
        .btn-submit {
            width: 100%;
            height: 52px;
            background: #F06B4E;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(240, 107, 78, 0.2);
            transition: all 0.2s;
        }
        
        .btn-submit:active {
            transform: scale(0.98);
            opacity: 0.95;
        }
        
        .error-message, .success-message {
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            font-weight: 500;
            display: none;
            padding: 8px;
            border-radius: 8px;
        }
        
        .error-message { color: #EF4444; background: #FEF2F2; }
        .success-message { color: #10B981; background: #ECFDF5; }
        .show { display: block; }
        
        .links-area {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .link {
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .link-primary { color: #F06B4E; }
        .link-secondary { color: #64748B; }
    </style>
</head>
<body>

    <div class="logo-area">
        <div class="logo-container">
            <img src="https://www.perelada.com/images/logo-perelada.svg" alt="Perelada Logo" class="logo-img">
        </div>
        <div class="logo-subtitle" id="viewTitle">GIRONA TEAM</div>
    </div>

    <form id="loginForm">
        <div class="form-group" id="nameGroup" style="display: none;">
            <label class="form-label">Nombre Completo</label>
            <input type="text" id="regName" class="form-input" placeholder="Ej: Jordi Deu Mora">
        </div>

        <div class="form-group">
            <label class="form-label" id="emailLabel">Correo Electrónico Corporativo</label>
            <input type="email" id="username" class="form-input" placeholder="usuario@pereladachivite.com" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn-submit" id="mainBtn">Iniciar Sesión</button>
        <div id="errorMsg" class="error-message">Correo o contraseña incorrectos, Señor.</div>
        <div id="successMsg" class="success-message">¡Cuenta creada con éxito!</div>
    </form>

    <div class="links-area">
        <span class="link link-primary" id="toggleModeBtn" onclick="switchMode()">Crear cuenta nueva</span>
        <a href="mailto:jordi.deu@pereladachivite.com?subject=Recuperar%20Contraseña%20App" class="link link-secondary">¿Has olvidado tu contraseña?</a>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, get, set, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa3SSatDfkTwEToiu-0eh1z-1JLV-_AVo",
            authDomain: "perelada-app.firebaseapp.com",
            projectId: "perelada-app",
            databaseURL: "https://perelada-app-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "perelada-app.firebasestorage.app",
            messagingSenderId: "103007022704",
            appId: "1:103007022704:web:593a053e5872132d400eb5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Paleta de colores — se asigna automáticamente al registrarse
        const COLORS = ['#3B82F6','#EF4444','#10B981','#F59E0B','#8B5CF6','#EC4899','#06B6D4','#84CC16'];

        let isLoginMode = true;

        // Asegurar que el admin existe en Firebase al cargar
        async function initAdmin() {
            const adminRef = ref(db, 'usuarios/jordi_deu_pereladachivite_com');
            const snap = await get(adminRef);
            if (!snap.exists()) {
                await set(adminRef, {
                    email: 'jordi.deu@pereladachivite.com',
                    password: '1234',
                    name: 'Jordi Deu Mora',
                    role: 'admin',
                    color: COLORS[0]
                });
            }
        }
        initAdmin();

        function emailToKey(email) {
            return email.replace(/[@.]/g, '_');
        }

        window.switchMode = function() {
            const viewTitle = document.getElementById('viewTitle');
            const nameGroup = document.getElementById('nameGroup');
            const mainBtn = document.getElementById('mainBtn');
            const toggleModeBtn = document.getElementById('toggleModeBtn');
            const regName = document.getElementById('regName');
            isLoginMode = !isLoginMode;

            if (isLoginMode) {
                viewTitle.textContent = "GIRONA TEAM";
                nameGroup.style.display = "none";
                regName.required = false;
                mainBtn.textContent = "Iniciar Sesión";
                toggleModeBtn.textContent = "Crear cuenta nueva";
            } else {
                viewTitle.textContent = "REGISTRO";
                nameGroup.style.display = "block";
                regName.required = true;
                mainBtn.textContent = "Registrar mi Cuenta";
                toggleModeBtn.textContent = "Volver al Login";
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const emailInput = document.getElementById('username').value.toLowerCase().trim();
            const passwordInput = document.getElementById('password').value;
            const regNameInput = document.getElementById('regName').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const btn = document.getElementById('mainBtn');

            btn.textContent = '...';
            btn.disabled = true;

            const key = emailToKey(emailInput);
            const userRef = ref(db, 'usuarios/' + key);

            if (isLoginMode) {
                const snap = await get(userRef);
                btn.textContent = 'Iniciar Sesión';
                btn.disabled = false;

                if (snap.exists() && snap.val().password === passwordInput) {
                    const user = snap.val();
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = "Correo o contraseña incorrectos.";
                    errorMsg.classList.add('show');
                    setTimeout(() => errorMsg.classList.remove('show'), 3000);
                }
            } else {
                // Registro nuevo
                const snap = await get(userRef);
                if (snap.exists()) {
                    btn.textContent = 'Registrar mi Cuenta';
                    btn.disabled = false;
                    errorMsg.textContent = "Este correo ya está registrado.";
                    errorMsg.classList.add('show');
                    setTimeout(() => errorMsg.classList.remove('show'), 3000);
                    return;
                }

                // Contar usuarios para asignar color
                const allSnap = await get(ref(db, 'usuarios'));
                const count = allSnap.exists() ? Object.keys(allSnap.val()).length : 0;
                const color = COLORS[count % COLORS.length];

                const newUser = {
                    email: emailInput,
                    password: passwordInput,
                    name: regNameInput,
                    role: 'worker',
                    color: color
                };

                await set(userRef, newUser);

                btn.textContent = 'Registrar mi Cuenta';
                btn.disabled = false;
                successMsg.textContent = '¡Cuenta creada! Ya puedes iniciar sesión.';
                successMsg.classList.add('show');
                setTimeout(() => {
                    successMsg.classList.remove('show');
                    window.switchMode();
                }, 2000);
            }
        });
    </script>
</body>
</html>
